<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptZero</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #c6d0f5;
    --dim: #585b70;
    --accent: #f38ba8;
    --accent2: #a6e3a1;
    --accent3: #89b4fa;
    --user-bg: #1e1e2e;
    --ai-bg: #181825;
    --input-bg: #181825;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
  }

  .logo span { color: var(--accent); }

  .status {
    font-size: 12px;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--accent2); }
  .status-dot.thinking { background: var(--accent3); animation: pulse 1s infinite; }
  .status-dot.error { background: var(--accent); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid var(--border);
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bg);
    border-left: 3px solid var(--accent);
  }

  .msg.system {
    align-self: center;
    color: var(--dim);
    font-size: 12px;
    font-style: italic;
  }

  .msg.error {
    align-self: center;
    color: var(--accent);
    font-size: 12px;
    border: 1px solid var(--accent);
    background: rgba(243, 139, 168, 0.05);
  }

  .msg .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: block;
  }

  .msg.user .label { color: var(--accent3); }
  .msg.ai .label { color: var(--accent); }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #input {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    transition: border-color 0.2s;
  }

  #input:focus { border-color: var(--accent3); }
  #input::placeholder { color: var(--dim); }

  button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 16px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 44px;
  }

  button:hover { border-color: var(--accent3); color: var(--accent3); }
  button:active { transform: scale(0.95); }
  button.recording { border-color: var(--accent); color: var(--accent); animation: pulse 0.8s infinite; }
  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .toolbar { display: flex; gap: 8px; }

  footer {
    padding: 8px 24px;
    text-align: center;
    font-size: 11px;
    color: var(--dim);
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>
  <header>
    <div class="logo">PROMPT<span>ZERO</span></div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">connecting...</span>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Type a command..." autofocus></textarea>
    <div class="toolbar">
      <button id="micBtn" title="Click to record voice">&#127908;</button>
      <button id="sendBtn" title="Send">&#9654;</button>
      <button id="resetBtn" title="Reset conversation">&#8634;</button>
    </div>
  </div>

  <footer>promptzero &mdash; flipper zero ai operator &mdash; no limits</footer>

<script>
const messagesEl = document.getElementById('messages');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const resetBtn = document.getElementById('resetBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

let ws;
let mediaRecorder;
let audioChunks = [];
let isRecording = false;

// Safe DOM message builder — no innerHTML
function addMessage(type, content, suffix) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  if (type === 'user' || type === 'ai') {
    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = type === 'user' ? ('you ' + (suffix || '')) : 'promptzero';
    div.appendChild(label);
  }

  div.appendChild(document.createTextNode(content));
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function clearMessages(text) {
  while (messagesEl.firstChild) {
    messagesEl.removeChild(messagesEl.firstChild);
  }
  addMessage('system', text);
}

// Add initial message
addMessage('system', 'PromptZero ready. Talk to your Flipper Zero.');

function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = function() { setStatus('connected', 'connected'); };
  ws.onclose = function() {
    setStatus('', 'disconnected \u2014 reconnecting...');
    setTimeout(connect, 2000);
  };
  ws.onerror = function() { setStatus('error', 'connection error'); };

  ws.onmessage = function(e) {
    var msg;
    try { msg = JSON.parse(e.data); } catch(err) { return; }
    switch (msg.type) {
      case 'response':
        addMessage('ai', msg.content);
        setStatus('connected', 'ready');
        setInputEnabled(true);
        break;
      case 'transcription':
        addMessage('user', msg.content, '(voice)');
        break;
      case 'status':
        if (msg.content === 'thinking') {
          setStatus('thinking', 'thinking...');
        } else if (msg.content === 'transcribing') {
          setStatus('thinking', 'transcribing...');
        } else if (msg.content === 'conversation reset') {
          clearMessages('Conversation reset.');
          setStatus('connected', 'ready');
        } else {
          setStatus('connected', msg.content);
        }
        break;
      case 'error':
        addMessage('error', msg.content);
        setStatus('error', 'error');
        setInputEnabled(true);
        setTimeout(function() { setStatus('connected', 'ready'); }, 3000);
        break;
    }
  };
}

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

function setInputEnabled(enabled) {
  input.disabled = !enabled;
  sendBtn.disabled = !enabled;
  micBtn.disabled = !enabled;
  if (enabled) input.focus();
}

function send() {
  var text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  addMessage('user', text);
  ws.send(JSON.stringify({ type: 'text', content: text }));
  input.value = '';
  input.style.height = 'auto';
  setInputEnabled(false);
}

input.addEventListener('input', function() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

sendBtn.addEventListener('click', send);

resetBtn.addEventListener('click', function() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'reset' }));
  }
});

// Voice recording via browser MediaRecorder
async function startRecording() {
  try {
    var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    audioChunks = [];

    mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      stream.getTracks().forEach(function(t) { t.stop(); });
      var blob = new Blob(audioChunks, { type: 'audio/webm' });
      var reader = new FileReader();
      reader.onloadend = function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'audio', content: reader.result }));
          setInputEnabled(false);
        }
      };
      reader.readAsDataURL(blob);
    };

    mediaRecorder.start();
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = '\u23F9';
  } catch (err) {
    addMessage('error', 'Microphone access denied: ' + err.message);
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = '\uD83C\uDFA4';
  }
}

micBtn.addEventListener('click', function() {
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
});

connect();
</script>
</body>
</html>
