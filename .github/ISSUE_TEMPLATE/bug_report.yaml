name: Bug report
description: PromptZero behaved unexpectedly — something crashed, errored, or did the wrong thing.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more concrete you can be, the faster we can diagnose.

        > **Security issues should NOT go here.** See [`SECURITY.md`](../../SECURITY.md) for the disclosure flow.

  - type: input
    id: version
    attributes:
      label: PromptZero version
      description: Output of `promptzero version`.
      placeholder: "v0.19.0 (commit abc1234)"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux (native)
        - Linux (WSL2)
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows
        - Other
    validations:
      required: true

  - type: dropdown
    id: hardware
    attributes:
      label: Hardware involved
      multiple: true
      options:
        - Flipper Zero (USB serial)
        - Flipper Zero (BLE)
        - ESP32 Marauder (separate USB)
        - ESP32 Marauder (Flipper UART bridge)
        - Bus Pirate
        - Faultier glitcher
        - None (host-only test)

  - type: input
    id: firmware
    attributes:
      label: Flipper firmware
      description: e.g. "Momentum 0.7.0", "Unleashed 1.4.2", "RogueMaster v0.4.2", "Official 1.0.1".
      placeholder: "Momentum 0.7.0"

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear, focused description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: |
        The smallest sequence that triggers it. Include the prompt(s) you typed, the slash commands, and any flags you set.
        Pre-formatted code blocks render nicely.
      value: |
        ```
        promptzero --persona ...
        > <prompt that triggers the bug>
        ```
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / output
      description: |
        Output from the REPL, audit log entries (`/audit query`), or anything else that helps. Redact API keys / captured data.
      render: shell
