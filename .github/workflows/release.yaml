name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build all platforms
        env:
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_PKG="github.com/xunholy/promptzero/internal/version"
          LDFLAGS="-s -w \
            -X ${VERSION_PKG}.Version=${TAG_NAME} \
            -X ${VERSION_PKG}.Commit=${COMMIT_SHA:0:7} \
            -X ${VERSION_PKG}.Date=${BUILD_DATE}"
          mkdir -p dist

          for pair in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${pair%/*}"
            GOARCH="${pair#*/}"
            BINARY="promptzero-${GOOS}-${GOARCH}"

            if [ "${GOOS}" = "windows" ]; then
              BINARY="${BINARY}.exe"
            fi

            echo "Building ${BINARY}..."
            GOOS="${GOOS}" GOARCH="${GOARCH}" go build \
              -trimpath \
              -ldflags "${LDFLAGS}" \
              -o "dist/${BINARY}" \
              ./cmd/promptzero

            cd dist
            if [ "${GOOS}" = "windows" ]; then
              zip "${BINARY%.exe}.zip" "${BINARY}"
            else
              tar czf "${BINARY}.tar.gz" "${BINARY}"
            fi
            cd ..
          done

          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt
          cat checksums.txt

      - name: Stage install.sh alongside release assets
        run: cp install.sh dist/install.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/install.sh
