name: Release

# Consumers verify release checksums with cosign keyless:
#
#   cosign verify-blob \
#     --certificate checksums.txt.pem \
#     --signature   checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/xunholy/promptzero/\.github/workflows/release\.yaml@refs/tags/v.*' \
#     --certificate-oidc-issuer    https://token.actions.githubusercontent.com \
#     checksums.txt
#
# The CycloneDX SBOM (promptzero.cdx.json) is attached for dependency auditing.
#
# Build topology: darwin targets are built on macOS runners with CGO
# enabled so tinygo.org/x/bluetooth's CoreBluetooth bindings link
# correctly — cross-compiling darwin from Linux strips CGO and silently
# disables BLE support at runtime. Linux and Windows are CGO-free.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

# Actions pinned to Node 24-native major versions; no env override needed.

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest, cgo: 0 }
          - { goos: linux,   goarch: arm64, runner: ubuntu-latest, cgo: 0 }
          # macos-13 was retired from the GitHub-hosted runner pool
          # (macOS 13 image removed). The current x86_64 macOS label
          # is macos-15-intel; macos-latest is Apple Silicon (arm64).
          # Symptom of using a retired label: the matrix job sits in
          # "queued" indefinitely waiting for a runner that doesn't
          # exist, and the gated release job never starts.
          - { goos: darwin,  goarch: amd64, runner: macos-15-intel, cgo: 1 }
          - { goos: darwin,  goarch: arm64, runner: macos-15,       cgo: 1 }
          - { goos: windows, goarch: amd64, runner: ubuntu-latest,  cgo: 0 }
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache: true

      - name: Build
        env:
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_PKG="github.com/xunholy/promptzero/internal/version"
          LDFLAGS="-s -w \
            -X ${VERSION_PKG}.Version=${TAG_NAME} \
            -X ${VERSION_PKG}.Commit=${COMMIT_SHA:0:7} \
            -X ${VERSION_PKG}.Date=${BUILD_DATE}"

          BINARY="promptzero-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "${LDFLAGS}" \
            -o "dist/${BINARY}" \
            ./cmd/promptzero

          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip "${BINARY%.exe}.zip" "${BINARY}"
            rm "${BINARY}"
          else
            tar czf "${BINARY}.tar.gz" "${BINARY}"
            rm "${BINARY}"
          fi
          ls -lh

      - name: Upload artifact
        # v7 (Apr 2026) — first major running on Node 24; v5 was Node 20
        # and emits a deprecation warning on every release run as
        # GitHub forces Node 24 as default 2026-06-02 and removes
        # Node 20 entirely 2026-09-16. Inputs unchanged from v5.
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        # v8 (Mar 2026) — pairs with upload-artifact@v7; same Node 24
        # runtime story. Pattern + merge-multiple inputs unchanged.
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: build-*
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt
          cat checksums.txt

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0.24.0
        with:
          path: ./
          format: cyclonedx-json
          artifact-name: promptzero.cdx.json
          output-file: dist/promptzero.cdx.json

      - name: Install cosign
        # sigstore/cosign-installer doesn't publish a moving major-version
        # tag ("v4" doesn't resolve), only full release tags. Pin to a
        # specific patch version; bump explicitly when upstream releases
        # a fix worth picking up.
        #
        # Pin cosign itself to the v2 line: cosign v3+ defaults to a
        # new bundle format that's incompatible with the
        # --output-signature / --output-certificate two-file convention
        # the verify-blob example in the header comment relies on. v3
        # ignores those flags silently and requires --bundle <path>
        # instead, which would break every downstream verifier using
        # the old `.sig` / `.pem` artifacts. Migrating to the bundle
        # format is a separate release-process change with consumer-
        # facing implications. v2.6.x is still maintained for security
        # fixes (v2.6.3 shipped April 2026); revisit when the bundle
        # migration is ready.
        uses: sigstore/cosign-installer@v4.1.1
        with:
          cosign-release: v2.6.3

      - name: Sign checksums with cosign (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Stage install.sh alongside release assets
        run: cp install.sh dist/install.sh

      - name: Sign install.sh with cosign (keyless)
        # Without this, a tampered install.sh on the release page would
        # be indistinguishable from the genuine artefact. Consumers who
        # care can verify with the same identity-regexp pattern shown
        # at the top of this workflow:
        #   cosign verify-blob \
        #     --certificate install.sh.pem --signature install.sh.sig \
        #     --certificate-identity-regexp '...refs/tags/v.*' \
        #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
        #     install.sh
        run: |
          cosign sign-blob --yes \
            --output-signature dist/install.sh.sig \
            --output-certificate dist/install.sh.pem \
            dist/install.sh

      # Resolve the release notes, in priority order:
      #   1. The CHANGELOG section matching the tag (Keep a Changelog:
      #      ## [<version>] - <date>) — curated, human-authored.
      #   2. The annotated tag message (subject + body, minus the
      #      signature) — every release is cut with `git tag -a` carrying
      #      a rich per-release description, so this guarantees real
      #      notes even when the CHANGELOG bump is skipped (the recent
      #      norm). This is the line that stops releases shipping with
      #      only an auto-generated "Full Changelog" link.
      #   3. GitHub auto-generated notes — last resort if both are empty.
      # The tag name flows through an env var (safe pattern) and is then
      # shell-expanded under double quotes — no direct ${{ ... }} inside
      # run: so no workflow-injection surface.
      - name: Resolve release notes
        id: extract_notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          notes_file="dist/release-notes.md"

          # actions/checkout resolves a tag-push trigger to its commit and
          # writes a LIGHTWEIGHT refs/tags/<tag> pointing at that commit, so
          # the %(contents:*) read below would return the *commit* message
          # instead of the annotated tag body (this silently shipped commit
          # subjects as release notes). Force-fetch the real annotated tag
          # object so %(contents:subject/body) resolve to the tag annotation.
          git fetch --force origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}" 2>/dev/null || true

          awk -v ver="$version" '
            /^## \[/{
              if (capture) { exit }
              if ($0 ~ "^## \\[" ver "\\]") { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md > "$notes_file"

          if [ -s "$notes_file" ]; then
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
            echo "--- release notes for $TAG_NAME (from CHANGELOG) ---"
            cat "$notes_file"
            exit 0
          fi

          # Fall back to the annotated tag message. %(contents:subject)
          # and %(contents:body) exclude the GPG/SSH signature block.
          git tag -l "$TAG_NAME" \
            --format='%(contents:subject)%0a%0a%(contents:body)' > "$notes_file"
          if [ -n "$(tr -d '[:space:]' < "$notes_file")" ]; then
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
            echo "--- release notes for $TAG_NAME (from tag annotation) ---"
            cat "$notes_file"
          else
            echo "no CHANGELOG section or tag annotation for $TAG_NAME; falling back to auto-generated notes"
            rm -f "$notes_file"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body_path: ${{ steps.extract_notes.outputs.notes_file }}
          generate_release_notes: ${{ steps.extract_notes.outputs.notes_file == '' }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/promptzero.cdx.json
            dist/install.sh
            dist/install.sh.sig
            dist/install.sh.pem
