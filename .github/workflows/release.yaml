name: Release

# Consumers verify release checksums with cosign keyless:
#
#   cosign verify-blob \
#     --certificate checksums.txt.pem \
#     --signature   checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/xunholy/promptzero/\.github/workflows/release\.yaml@refs/tags/v.*' \
#     --certificate-oidc-issuer    https://token.actions.githubusercontent.com \
#     checksums.txt
#
# The CycloneDX SBOM (promptzero.cdx.json) is attached for dependency auditing.
#
# Build topology: darwin targets are built on macOS runners with CGO
# enabled so tinygo.org/x/bluetooth's CoreBluetooth bindings link
# correctly — cross-compiling darwin from Linux strips CGO and silently
# disables BLE support at runtime. Linux and Windows are CGO-free.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - { goos: linux,   goarch: amd64, runner: ubuntu-latest, cgo: 0 }
          - { goos: linux,   goarch: arm64, runner: ubuntu-latest, cgo: 0 }
          - { goos: darwin,  goarch: amd64, runner: macos-13,      cgo: 1 }
          - { goos: darwin,  goarch: arm64, runner: macos-latest,  cgo: 1 }
          - { goos: windows, goarch: amd64, runner: ubuntu-latest, cgo: 0 }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        env:
          TAG_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VERSION_PKG="github.com/xunholy/promptzero/internal/version"
          LDFLAGS="-s -w \
            -X ${VERSION_PKG}.Version=${TAG_NAME} \
            -X ${VERSION_PKG}.Commit=${COMMIT_SHA:0:7} \
            -X ${VERSION_PKG}.Date=${BUILD_DATE}"

          BINARY="promptzero-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "${LDFLAGS}" \
            -o "dist/${BINARY}" \
            ./cmd/promptzero

          cd dist
          if [ "${GOOS}" = "windows" ]; then
            zip "${BINARY%.exe}.zip" "${BINARY}"
            rm "${BINARY}"
          else
            tar czf "${BINARY}.tar.gz" "${BINARY}"
            rm "${BINARY}"
          fi
          ls -lh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1
          if-no-files-found: error

  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: build-*
          merge-multiple: true

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt
          cat checksums.txt

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: ./
          format: cyclonedx-json
          artifact-name: promptzero.cdx.json
          output-file: dist/promptzero.cdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums with cosign (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Stage install.sh alongside release assets
        run: cp install.sh dist/install.sh

      # Extract the CHANGELOG section matching the tag. The pattern
      # mirrors Keep a Changelog: ## [<version>] - <date>. Falling
      # back to auto-generated notes when no section is found means a
      # forgotten CHANGELOG bump never blocks a release. The tag name
      # flows through an env var (safe pattern) and is then shell-
      # expanded under double quotes — no direct ${{ ... }} inside
      # run: so no workflow-injection surface.
      - name: Extract release notes from CHANGELOG
        id: extract_notes
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          notes_file="dist/release-notes.md"
          awk -v ver="$version" '
            /^## \[/{
              if (capture) { exit }
              if ($0 ~ "^## \\[" ver "\\]") { capture = 1; next }
            }
            capture { print }
          ' CHANGELOG.md > "$notes_file"

          if [ -s "$notes_file" ]; then
            echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"
            echo "--- release notes for $TAG_NAME ---"
            cat "$notes_file"
          else
            echo "no CHANGELOG section found for $TAG_NAME; falling back to auto-generated notes"
            rm -f "$notes_file"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.extract_notes.outputs.notes_file }}
          generate_release_notes: ${{ steps.extract_notes.outputs.notes_file == '' }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
            dist/promptzero.cdx.json
            dist/install.sh
