name: CI

# CI gates pull requests only. main is updated exclusively through squash
# PRs, so the merged commit is the exact diff this workflow already
# validated on the PR — a second post-merge run on push:main would just
# re-do that work, so it is intentionally omitted. Per-platform build
# coverage (darwin / windows / arm64) lives in release.yaml, which builds
# every target on each tag; running a 5-way cross-compile on every PR
# duplicated that for no extra signal, so it was removed here.
on:
  pull_request:
    branches: [main]
    # Documentation-only changes don't affect the build/test/lint/vuln
    # surface, so skip the Go pipeline entirely for them.
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.github/assets/**'

# Cancel a PR's in-flight CI when a new commit is pushed to it, instead of
# letting superseded runs finish.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# All actions below are pinned to versions whose JavaScript runtime
# targets Node.js 24, matching the GitHub-hosted runner default.

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.11']

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.11'
          cache: true

      # Pinned (not @latest) so the tool version is reproducible and the
      # module download is served from the setup-go cache instead of being
      # re-resolved every run.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.4.0

      - name: govulncheck
        run: govulncheck ./...

  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce a Moderate-or-higher severity CVE
          # in any dependency. The project is AGPL-3.0-or-later;
          # license gating stays manual for now since GitHub's catalog
          # mis-classifies some niche RF/hardware deps we use.
          fail-on-severity: moderate
