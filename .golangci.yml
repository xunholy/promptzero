version: "2"

# Configuration for golangci-lint.
#
# errcheck is disabled intentionally: almost every hit it produces in this
# codebase is legitimate - deferred cleanup on cancellation paths
# (port.Close, db.Close, rows.Close), stderr status writes (fmt.Fprintf),
# temp-file removals, and best-effort Flipper CLI sends inside error-recovery
# branches. Fighting it with exclude-functions patterns was hostile to the
# actual bugs we want errcheck for (checking return values of logic calls).
#
# govet + staticcheck + unused + ineffassign cover the real correctness risks.

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
  exclusions:
    rules:
      # SA5011 (possible nil pointer dereference) fires a false positive in
      # tests on the standard `x := f(); if x == nil { t.Fatal(...) }; x.Field`
      # idiom: under newer Go toolchains the bundled staticcheck stops modelling
      # testing.T.Fatal as terminating, so it treats the guarded deref as
      # nil-reachable. t.Fatal does stop the test, so this is benign in *_test.go.
      # Kept active for non-test code, where a real nil deref matters.
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA5011"

formatters:
  enable:
    - gofmt
