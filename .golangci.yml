version: "2"

# Configuration for golangci-lint.
#
# errcheck is disabled intentionally: almost every hit it produces in this
# codebase is legitimate - deferred cleanup on cancellation paths
# (port.Close, db.Close, rows.Close), stderr status writes (fmt.Fprintf),
# temp-file removals, and best-effort Flipper CLI sends inside error-recovery
# branches. Fighting it with exclude-functions patterns was hostile to the
# actual bugs we want errcheck for (checking return values of logic calls).
#
# govet + staticcheck + unused + ineffassign cover the real correctness risks.

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt
