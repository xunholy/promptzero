#
# Taskfile.yml — build/dev tasks for promptzero.
# Docs: https://taskfile.dev

version: "3"

vars:
  APP: promptzero
  PKG: github.com/xunholy/promptzero
  BIN: bin/{{.APP}}
  VERSION_PKG: "{{.PKG}}/internal/version"
  GOLANGCI_LINT_VERSION: v2.11.4

env:
  CGO_ENABLED: "0"

tasks:
  default:
    desc: Show available tasks.
    cmds:
      - task --list

  dev:setup:
    desc: Install pinned dev tools (golangci-lint) into GOBIN.
    cmds:
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - echo "dev tools installed — ensure $(go env GOPATH)/bin is on PATH"

  build:
    desc: Build the binary with version ldflags stamped from git.
    vars:
      COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
      DATE:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - >-
        go build -trimpath
        -ldflags "-s -w
        -X {{.VERSION_PKG}}.Commit={{.COMMIT}}
        -X {{.VERSION_PKG}}.Date={{.DATE}}"
        -o {{.BIN}} ./cmd/promptzero

  run:
    desc: Build and run the binary.
    deps: [build]
    cmds:
      - ./{{.BIN}}

  build:runner:
    desc: Build pzrunner — non-interactive harness used to reproduce docs/ examples.
    cmds:
      - go build -trimpath -o bin/pzrunner ./cmd/pzrunner

  tidy:
    desc: Tidy go.mod / go.sum.
    cmds:
      - go mod tidy

  lint:
    desc: Run golangci-lint across the module.
    cmds:
      - golangci-lint run ./...

  vet:
    desc: go vet across the module.
    cmds:
      - go vet ./...

  test:
    desc: Short test suite — skips slow timing-sensitive tests.
    cmds:
      - go test -race -count=1 -short ./...

  test:full:
    desc: Full test suite (matches CI).
    cmds:
      - go test -race -count=1 ./...

  eval:
    desc: Golden evaluation harness (roadmap P2-25). Runs integration
      scenarios against mock transports and reports pass/fail + timing
      per scenario. CI gate for regressions in top-level agent flows.
    cmds:
      - go test -race -count=1 -v -run TestDefaultSuiteAllPass ./internal/eval/...

  usecases:
    desc: Run realistic operator tasks against a live Flipper. Short
      natural-language prompts mapped to the primitives the agent
      would dispatch. Reports pass/fail + concise summaries per
      category. Pre-release check that catches "tool returns
      success=true but did nothing useful" regressions. Requires a
      Flipper attached at /dev/ttyACM0.
    cmds:
      - go build -o /tmp/flipper-usecases ./cmd/flipper-usecases
      - /tmp/flipper-usecases {{.CLI_ARGS}}

  rag:sync-corpus:
    desc: Sync internal/rag/corpus/ from docs/reference + docs/scenarios
      so the BM25 index ships the current authoritative documentation.
      Run after editing a doc in docs/ that the agent should be able to
      retrieve via docs_search.
    cmds:
      - rm -f internal/rag/corpus/*.md
      - cp docs/reference/*.md internal/rag/corpus/
      - cp docs/scenarios/*.md internal/rag/corpus/
      - echo "corpus synced — remember to run 'task test' and commit the regenerated files"

  clean:
    desc: Remove build artefacts.
    cmds:
      - rm -rf bin/
